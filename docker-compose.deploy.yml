name: ${KIROCC_DEPLOY_PROJECT:-kirocc-prox-deploy}

services:
  app:
    image: ${KIROCC_IMAGE:-ghcr.io/2ue/kirocc-prox}:${KIROCC_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KIROCC_HOST: 0.0.0.0
      KIROCC_PORT: 9326
      KIROCC_ADMIN: "true"
      KIROCC_ADMIN_HOST: 0.0.0.0
      KIROCC_ADMIN_PORT: 3457
      KIROCC_API_KEY: ${KIROCC_API_KEY:-}
      KIROCC_ADMIN_KEY: ${KIROCC_ADMIN_KEY:?run ./scripts/init-deploy-env.sh .env.deploy first}
      KIROCC_ADMIN_PUBLIC_URL: ${KIROCC_ADMIN_PUBLIC_URL:-}
      KIROCC_POOL_STRATEGY: ${KIROCC_POOL_STRATEGY:-least-inflight}
      KIROCC_POSTGRES_DSN: postgres://${POSTGRES_USER:-kirocc}:${POSTGRES_PASSWORD:?run ./scripts/init-deploy-env.sh .env.deploy first}@postgres:5432/${POSTGRES_DB:-kirocc_pro}?sslmode=disable
      KIROCC_REDIS_ADDR: redis:6379
      KIROCC_REDIS_PASSWORD: ${REDIS_PASSWORD:?run ./scripts/init-deploy-env.sh .env.deploy first}
      KIROCC_REDIS_DB: ${KIROCC_REDIS_DB:-0}
      KIROCC_REDIS_KEY_PREFIX: ${KIROCC_REDIS_KEY_PREFIX:-kirocc:deploy:}
      KIROCC_REDIS_LEASE_TTL: ${KIROCC_REDIS_LEASE_TTL:-30m}
      KIROCC_QUOTA_POLL_INTERVAL: ${KIROCC_QUOTA_POLL_INTERVAL:-3m}
      KIROCC_PROMPT_CACHE: ${KIROCC_PROMPT_CACHE:-false}
      KIROCC_PROMPT_CACHE_TARGET_READ_RATIO: ${KIROCC_PROMPT_CACHE_TARGET_READ_RATIO:-0.90}
      KIROCC_PROMPT_CACHE_REPORTS: ${KIROCC_PROMPT_CACHE_REPORTS:-}
    ports:
      - "${KIROCC_PROXY_BIND:-127.0.0.1}:${KIROCC_PROXY_HOST_PORT:-9326}:9326"
      - "${KIROCC_ADMIN_BIND:-127.0.0.1}:${KIROCC_ADMIN_HOST_PORT:-3457}:3457"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 3 -O- http://127.0.0.1:9326/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    user: "${KIROCC_POSTGRES_UID:-70}:${KIROCC_POSTGRES_GID:-70}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kirocc_pro}
      POSTGRES_USER: ${POSTGRES_USER:-kirocc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?run ./scripts/init-deploy-env.sh .env.deploy first}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - type: bind
        source: ${KIROCC_DATA_DIR:-./deploy-data}/postgres
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?run ./scripts/init-deploy-env.sh .env.deploy first}
    command:
      - sh
      - -ec
      - |
        exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
    volumes:
      - type: bind
        source: ${KIROCC_DATA_DIR:-./deploy-data}/redis
        target: /data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
