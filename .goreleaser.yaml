version: 2

builds:
  - id: kirocc
    main: ./cmd/kirocc
    binary: kirocc
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=jsonv2
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.gitSHA={{ .ShortCommit }}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: kirocc
    ids:
      - kirocc
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

# [fork] Homebrew cask publishing removed — fork has no homebrew tap yet.
# To re-enable, set owner/name to your own homebrew tap repo and provide HOMEBREW_TAP_TOKEN.

release:
  draft: false
  prerelease: auto
