name: Publish Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag without the leading v, for example 1.2.3"
        required: true
        type: string

concurrency:
  group: docker-publish-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: kirocc-prox

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version and image names
        id: meta
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Docker publish version must look like 1.2.3, 1.2.3-rc.1, or a v-prefixed Git tag."
            exit 1
          fi
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "::error::Docker Hub publish requires DOCKERHUB_USERNAME repository secret."
            exit 1
          fi

          GHCR_IMAGE="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}"
          DOCKERHUB_IMAGE="docker.io/${DOCKERHUB_USERNAME}/${IMAGE_NAME}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=${GHCR_IMAGE,,}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=${DOCKERHUB_IMAGE,,}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${GHCR_IMAGE,,}:${VERSION}"
            echo "${DOCKERHUB_IMAGE,,}:${VERSION}"
            if [[ "$VERSION" != *-* ]]; then
              echo "${GHCR_IMAGE,,}:latest"
              echo "${DOCKERHUB_IMAGE,,}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate Docker Hub token
        shell: bash
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::Docker Hub publish requires DOCKERHUB_TOKEN repository secret."
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          labels: |
            org.opencontainers.image.title=kirocc-prox
            org.opencontainers.image.description=Kiro Claude Code proxy with PostgreSQL and Redis scheduling
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
